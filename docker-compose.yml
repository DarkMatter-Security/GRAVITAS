version: "3.8"

services:
  gravitas:
    build: .
    container_name: gravitas
    volumes:
      - ~/.gravitas:/root/.gravitas
      - ~/.omnipentestx:/root/.omnipentestx:ro
    command: python -m gravitas pipeline
    restart: unless-stopped
    networks:
      - gravitas-net

  # Future: Neo4j for V4 Graph
  # neo4j:
