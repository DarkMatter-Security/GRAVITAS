  #   volumes:
  #     - neo4j-data:/data

  # Future: Kafka for V6 Streaming
  # zookeeper:
  #   image: confluentinc/cp-zookeeper:latest
  # kafka:
  #   image: confluentinc/cp-kafka:latest

networks:
  gravitas-net:
    driver: bridge

volumes:
  neo4j-data:
